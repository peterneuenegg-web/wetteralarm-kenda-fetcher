name: fetch-kenda

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    # Stündlich, 15 Min nach voller Stunde (KENDA publiziert i.d.R. ~30 Min nach
    # Stundenende). GitHub-Cron ist best-effort; LOOKBACK_HOURS deckt Lücken ab.
    - cron: "15 * * * *"
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: "Wie viele Stunden zurück (Default 24)"
        required: false
        default: "24"

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system deps (eccodes)
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes0

      - name: Install python deps
        run: pip install -r requirements.txt

      - name: Fetch + upload (PoC SFTP + Stage Ingest)
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          SFTP_REMOTE_DIR: ${{ secrets.SFTP_REMOTE_DIR }}
          INGEST_URL: ${{ secrets.STAGE_INGEST_URL }}
          INGEST_TOKEN: ${{ secrets.STAGE_INGEST_TOKEN }}
          HEARTBEAT_URL: https://schaden.wetteralarm.ch/stage/api/external-heartbeat.php?job=fetch_kenda
          LOOKBACK_HOURS: ${{ github.event.inputs.lookback_hours || '24' }}
        run: python fetch_kenda.py

      - name: Fetch + upload (Prod Ingest, parallel run)
        # Prod-Ingest läuft als zweiter Durchgang, damit Stage und Prod
        # voneinander unabhängig sind. SFTP zum PoC-Widget passiert dabei
        # ein zweites Mal — idempotent.
        if: env.PROD_INGEST_URL != ''
        env:
          PROD_INGEST_URL: ${{ secrets.PROD_INGEST_URL }}
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          SFTP_REMOTE_DIR: ${{ secrets.SFTP_REMOTE_DIR }}
          INGEST_URL: ${{ secrets.PROD_INGEST_URL }}
          INGEST_TOKEN: ${{ secrets.PROD_INGEST_TOKEN }}
          HEARTBEAT_URL: https://schaden.wetteralarm.ch/api/external-heartbeat.php?job=fetch_kenda
          LOOKBACK_HOURS: ${{ github.event.inputs.lookback_hours || '24' }}
        run: python fetch_kenda.py
