name: fetch-kenda

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    # Fallback: GitHub-Cron alle 30 Min — best-effort, kompensiert wenn der
    # Schaden-Cron auf Infomaniak einmal nicht durchkommt.
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: "Wie viele Stunden zurück (Default 4 bei Cron-Trigger, 24 für Backfill)"
        required: false
        default: "24"
      triggered_by:
        description: "Auslöser (manuell oder schaden-cron-<env>)"
        required: false
        default: "manual"

jobs:
  fetch:
    # WICHTIG: auf ubuntu-22.04 pinnen statt ubuntu-latest. Letzteres ist seit
    # ~Mitte 2026 ubuntu-24.04. Dort wurde libeccodes durch die libc-time64-
    # Migration zu `libeccodes2t64` umbenannt — der Python-Wrapper `eccodes`
    # findet die native Library dann uneindeutig, was beim ersten GRIB-Decode
    # mit unstructured_grid (ICON-CH1-T-Mesh) zu Segfault führt.
    runs-on: ubuntu-22.04
    # 24h-Backfill mit Stage+Prod-Doppel-Ingest braucht im Worst-Case ~28 Min
    # (336 Items × ~2.5 s × 2 Targets). 50 Min Puffer schützt vor Netzwerk-Lag
    # und manuellen Backfills mit höherem lookback_hours.
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system deps (eccodes)
        # libeccodes-tools liefert die Definition-Files mit, libeccodes-dev die
        # Header — beides hilft findlibs, die richtige Variante zu finden.
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes0 libeccodes-tools libeccodes-dev

      - name: Install python deps
        run: pip install -r requirements.txt

      - name: Detect prod config
        # Job-Output, damit der Prod-Step nur läuft wenn beide Secrets gesetzt
        # sind. `secrets.*` in einem `if:` wird von GitHub auf null maskiert —
        # deshalb der Umweg über einen Output-Step.
        id: cfg
        env:
          PROD_URL: ${{ secrets.PROD_INGEST_URL }}
          PROD_TOKEN: ${{ secrets.PROD_INGEST_TOKEN }}
        run: |
          if [ -n "$PROD_URL" ] && [ -n "$PROD_TOKEN" ]; then
            echo "has_prod=true"  >> "$GITHUB_OUTPUT"
            echo "Prod-Ingest ist konfiguriert"
          else
            echo "has_prod=false" >> "$GITHUB_OUTPUT"
            echo "Prod-Ingest ist NICHT konfiguriert — Prod-Step wird übersprungen"
          fi

      - name: Fetch + ingest Stage
        env:
          INGEST_URL: ${{ secrets.STAGE_INGEST_URL }}
          INGEST_TOKEN: ${{ secrets.STAGE_INGEST_TOKEN }}
          HEARTBEAT_URL: https://schaden.wetteralarm.ch/stage/api/external-heartbeat.php?job=fetch_kenda
          # workflow_dispatch-Input hat Vorrang. Cron-Trigger (ohne Input)
          # fällt auf 4h zurück — damit der 30-Min-Cron-Run zügig durch ist.
          # Manuelle Backfills nutzen das `Run workflow`-Formular mit
          # lookback_hours=24 (Default im Input) oder höher.
          LOOKBACK_HOURS: ${{ github.event.inputs.lookback_hours || '4' }}
        run: python fetch_kenda.py

      - name: Fetch + ingest Prod
        # Zweiter Worker-Lauf für Prod-Ingest, läuft nur wenn die Prod-Secrets
        # gesetzt sind (Output aus dem Detect-Step).
        if: steps.cfg.outputs.has_prod == 'true'
        env:
          INGEST_URL: ${{ secrets.PROD_INGEST_URL }}
          INGEST_TOKEN: ${{ secrets.PROD_INGEST_TOKEN }}
          HEARTBEAT_URL: https://schaden.wetteralarm.ch/api/external-heartbeat.php?job=fetch_kenda
          LOOKBACK_HOURS: ${{ github.event.inputs.lookback_hours || '4' }}
        run: python fetch_kenda.py
